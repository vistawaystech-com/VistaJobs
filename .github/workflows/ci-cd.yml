name: VistaJobs CI/CD

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/JBP.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore JBP/JBP.csproj
    - name: Build
      run: dotnet build JBP/JBP.csproj --no-restore -c Release
    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- .NET build: Passed" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Build Docker image
      run: docker build -t vistajobs:${{ github.run_number }} -f JBP/Dockerfile .
    - name: Tag as latest
      run: docker tag vistajobs:${{ github.run_number }} vistajobs:latest
    - name: Verify image
      run: docker images vistajobs
    - name: Docker Summary
      run: |
        echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
        echo "- Tag: vistajobs:${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "- Status: Built successfully" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - name: Notify testing team
      run: |
        echo "## Deployment Ready" >> $GITHUB_STEP_SUMMARY
        echo "Build #${{ github.run_number }} is ready for testing." >> $GITHUB_STEP_SUMMARY
        echo "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "Build #${{ github.run_number }} successful"
        echo "Ready for testing!"
