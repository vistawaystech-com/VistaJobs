name: VistaJobs CI/CD

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore JBP/JBP.csproj

    - name: Build
      run: dotnet build JBP/JBP.csproj --no-restore -c Release

    - name: Docker Build
      run: docker build -t vistajobs:${{ github.run_number }} -f JBP/Dockerfile .
